apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-management
  namespace: sai-mahendra-platform
  labels:
    app: content-management
    tier: backend
    component: content
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-management
  template:
    metadata:
      labels:
        app: content-management
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: content-management-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: content-management
        image: sai-mahendra/content-management:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3005
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: content-management-config
              key: NODE_ENV
        - name: PORT
          value: "3005"
        - name: MONGODB_URL
          valueFrom:
            secretKeyRef:
              name: mongodb-credentials
              key: url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: content-management-config
              key: S3_BUCKET
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: content-management-config
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: content-management
  namespace: sai-mahendra-platform
  labels:
    app: content-management
spec:
  type: ClusterIP
  ports:
  - port: 3005
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: content-management
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: content-management-config
  namespace: sai-mahendra-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  S3_BUCKET: "sai-mahendra-content"
  CLOUDFRONT_DOMAIN: "cdn.saimahendra.com"
  MAX_FILE_SIZE: "10485760"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: content-management-sa
  namespace: sai-mahendra-platform
  labels:
    app: content-management
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: content-management-pdb
  namespace: sai-mahendra-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: content-management
