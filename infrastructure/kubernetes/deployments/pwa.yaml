apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwa
  namespace: sai-mahendra-platform
  labels:
    app: pwa
    tier: backend
    component: pwa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pwa
  template:
    metadata:
      labels:
        app: pwa
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3009"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pwa-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: pwa
        image: sai-mahendra/pwa:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3009
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: pwa-config
              key: NODE_ENV
        - name: PORT
          value: "3009"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: project-id
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: pwa-config
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pwa
  namespace: sai-mahendra-platform
  labels:
    app: pwa
spec:
  type: ClusterIP
  ports:
  - port: 3009
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: pwa
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pwa-config
  namespace: sai-mahendra-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  OFFLINE_CACHE_TTL: "86400"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pwa-sa
  namespace: sai-mahendra-platform
  labels:
    app: pwa
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pwa-pdb
  namespace: sai-mahendra-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pwa
