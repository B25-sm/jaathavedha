apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: sai-mahendra-platform
  labels:
    app: notification
    tier: backend
    component: notification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3007"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: notification-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: notification
        image: sai-mahendra/notification:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3007
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: notification-config
              key: NODE_ENV
        - name: PORT
          value: "3007"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        - name: SENDGRID_API_KEY
          valueFrom:
            secretKeyRef:
              name: sendgrid-credentials
              key: api-key
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: project-id
        - name: FIREBASE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: private-key
        - name: FIREBASE_CLIENT_EMAIL
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: client-email
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: notification-config
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: sai-mahendra-platform
  labels:
    app: notification
spec:
  type: ClusterIP
  ports:
  - port: 3007
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: notification
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
  namespace: sai-mahendra-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  EMAIL_FROM: "noreply@saimahendra.com"
  QUEUE_CONCURRENCY: "10"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-sa
  namespace: sai-mahendra-platform
  labels:
    app: notification
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-pdb
  namespace: sai-mahendra-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: notification
