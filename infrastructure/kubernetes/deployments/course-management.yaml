apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-management
  namespace: sai-mahendra-platform
  labels:
    app: course-management
    tier: backend
    component: courses
spec:
  replicas: 3
  selector:
    matchLabels:
      app: course-management
  template:
    metadata:
      labels:
        app: course-management
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: course-management-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: course-management
        image: sai-mahendra/course-management:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3002
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: course-management-config
              key: NODE_ENV
        - name: PORT
          value: "3002"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: postgres-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: course-management-config
              key: S3_BUCKET
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: course-management-config
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - course-management
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: course-management
  namespace: sai-mahendra-platform
  labels:
    app: course-management
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: course-management
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: course-management-config
  namespace: sai-mahendra-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  S3_BUCKET: "sai-mahendra-course-content"
  CLOUDFRONT_DOMAIN: "cdn.saimahendra.com"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: course-management-sa
  namespace: sai-mahendra-platform
  labels:
    app: course-management
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: course-management-pdb
  namespace: sai-mahendra-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: course-management
