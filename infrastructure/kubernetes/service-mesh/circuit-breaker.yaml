---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-retry
  namespace: sai-mahendra
spec:
  hosts:
  - payment
  http:
  - route:
    - destination:
        host: payment
    timeout: 30s
    retries:
      attempts: 2
      perTryTimeout: 15s
      retryOn: 5xx,reset,connect-failure
