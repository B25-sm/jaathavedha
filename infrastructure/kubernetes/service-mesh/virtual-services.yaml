# Istio Virtual Services for Traffic Management
# Defines routing rules and traffic policies for services

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: sai-mahendra-platform
spec:
  hosts:
  - api-gateway
  - api.saimahendra.com
  gateways:
  - istio-gateway
  - mesh
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: api-gateway
        port:
          number: 3000
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure,refused-stream

