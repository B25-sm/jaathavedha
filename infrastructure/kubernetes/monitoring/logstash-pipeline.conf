input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Parse log level
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  } else if [severity] {
    mutate {
      rename => { "severity" => "level" }
      uppercase => ["level"]
    }
  }

  # Extract service name
  if [service] {
    mutate {
      add_field => { "service_name" => "%{service}" }
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "UNIX"]
    target => "@timestamp"
  }

  # Add environment tag
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:development}"
      "platform" => "sai-mahendra"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
