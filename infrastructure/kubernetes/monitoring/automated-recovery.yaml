# Automated Recovery Mechanisms for Kubernetes
# These configurations enable self-healing capabilities

---
# Horizontal Pod Autoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-management-hpa
  namespace: sai-mahendra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-management-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max

---
# Pod Disruption Budget to ensure availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-management-pdb
  namespace: sai-mahendra
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-management-service

---
# Liveness and Readiness Probes (example deployment with probes)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management-service
  namespace: sai-mahendra
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-management-service
  template:
    metadata:
      labels:
        app: user-management-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: user-management
          image: sai-mahendra/user-management:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          # Liveness probe - restart container if unhealthy
          livenessProbe:
            httpGet:
              path: /health/alive
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          # Readiness probe - remove from service if not ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          # Startup probe - allow more time for initial startup
          startupProbe:
            httpGet:
              path: /health/alive
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
            successThreshold: 1
      # Restart policy
      restartPolicy: Always
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# Network Policy for security and isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-management-network-policy
  namespace: sai-mahendra
spec:
  podSelector:
    matchLabels:
      app: user-management-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from API Gateway
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 3000
    # Allow traffic from monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow database access
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis access
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

---
# Resource Quotas to prevent resource exhaustion
apiVersion: v1
kind: ResourceQuota
metadata:
  name: sai-mahendra-quota
  namespace: sai-mahendra
spec:
  hard:
    requests.cpu: "50"
    requests.memory: 100Gi
    limits.cpu: "100"
    limits.memory: 200Gi
    persistentvolumeclaims: "20"
    services.loadbalancers: "5"

---
# Limit Range to set default resource limits
apiVersion: v1
kind: LimitRange
metadata:
  name: sai-mahendra-limits
  namespace: sai-mahendra
spec:
  limits:
    - max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      type: Container
    - max:
        cpu: "8"
        memory: 16Gi
      min:
        cpu: 500m
        memory: 512Mi
      type: Pod

---
# Priority Class for critical services
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000
globalDefault: false
description: "High priority for critical services"

---
# Priority Class for normal services
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: normal-priority
value: 500
globalDefault: true
description: "Normal priority for standard services"

---
# CronJob for automated cleanup tasks
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-old-logs
  namespace: sai-mahendra
spec:
  schedule: "0 2 * * *"  # Run daily at 2 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: busybox:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Cleaning up old logs..."
                  # Add cleanup logic here
                  find /var/log -name "*.log" -mtime +7 -delete
          restartPolicy: OnFailure

---
# Service Monitor for Prometheus auto-discovery
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-management-monitor
  namespace: sai-mahendra
  labels:
    app: user-management-service
spec:
  selector:
    matchLabels:
      app: user-management-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
