global:
  resolve_timeout: 5m
  # PagerDuty integration key (set via environment variable or secret)
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  
  # Slack webhook URL (set via environment variable or secret)
  slack_api_url: 'https://hooks.slack.com/services/YOUR_WEBHOOK_URL'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert routing
route:
  # Default receiver for all alerts
  receiver: 'default'
  
  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']
  
  # Wait time before sending initial notification
  group_wait: 10s
  
  # Wait time before sending notification about new alerts in group
  group_interval: 10s
  
  # Wait time before re-sending notification
  repeat_interval: 12h
  
  # Child routes with specific routing rules
  routes:
    # Critical alerts go to PagerDuty and Slack
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
      routes:
        - match:
            component: availability
          receiver: 'pagerduty-critical'
          group_wait: 0s
          group_interval: 5m
          repeat_interval: 4h
    
    # Critical alerts also go to Slack
    - match:
        severity: critical
      receiver: 'slack-critical'
      continue: false
    
    # Warning alerts go to Slack only
    - match:
        severity: warning
      receiver: 'slack-warnings'
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 24h
    
    # Info alerts go to email
    - match:
        severity: info
      receiver: 'email-info'
      group_wait: 5m
      group_interval: 1h
      repeat_interval: 24h
    
    # Business alerts go to business team
    - match:
        component: business
      receiver: 'slack-business'
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 6h
    
    # Database alerts
    - match:
        component: database
      receiver: 'slack-database'
      continue: true
    
    # Performance alerts
    - match:
        component: api
      receiver: 'slack-performance'

# Inhibition rules to prevent alert spam
inhibit_rules:
  # Inhibit warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
  
  # Inhibit all alerts if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['service']
  
  # Inhibit high error rate if very high error rate is firing
  - source_match:
      alertname: 'VeryHighAPIResponseTime'
    target_match:
      alertname: 'HighAPIResponseTime'
    equal: ['service']

# Receivers define notification destinations
receivers:
  # Default receiver (logs only)
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9093/api/v1/alerts'
        send_resolved: true

  # PagerDuty for critical alerts
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: 'critical'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          description: '{{ .CommonAnnotations.description }}'
          cluster: '{{ .GroupLabels.cluster }}'
          service: '{{ .GroupLabels.service }}'
        client: 'Prometheus Alertmanager'
        client_url: 'http://prometheus.monitoring.svc.cluster.local:9090'
        send_resolved: true

  # Slack for critical alerts
  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-critical'
        username: 'Alertmanager'
        icon_emoji: ':fire:'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .GroupLabels.severity }}
          *Component:* {{ .GroupLabels.component }}
          *Cluster:* {{ .GroupLabels.cluster }}
          
          *Firing Alerts:* {{ .Alerts.Firing | len }}
          {{ range .Alerts.Firing }}
          • {{ .Labels.alertname }} on {{ .Labels.instance }}
          {{ end }}
        send_resolved: true
        title_link: 'http://prometheus.monitoring.svc.cluster.local:9090/alerts'
        color: 'danger'

  # Slack for warning alerts
  - name: 'slack-warnings'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-warnings'
        username: 'Alertmanager'
        icon_emoji: ':warning:'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Component:* {{ .GroupLabels.component }}
          
          *Firing Alerts:* {{ .Alerts.Firing | len }}
        send_resolved: true
        color: 'warning'

  # Slack for business alerts
  - name: 'slack-business'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-business'
        username: 'Business Metrics'
        icon_emoji: ':chart_with_upwards_trend:'
        title: '📊 Business Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          
          *Details:*
          {{ range .Alerts.Firing }}
          • {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: '#36a64f'

  # Slack for database alerts
  - name: 'slack-database'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-database'
        username: 'Database Monitor'
        icon_emoji: ':database:'
        title: '🗄️ Database Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .GroupLabels.severity }}
        send_resolved: true

  # Slack for performance alerts
  - name: 'slack-performance'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-performance'
        username: 'Performance Monitor'
        icon_emoji: ':rocket:'
        title: '⚡ Performance Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
        send_resolved: true
        color: 'warning'

  # Email for info alerts
  - name: 'email-info'
    email_configs:
      - to: 'ops-team@sai-mahendra.com'
        from: 'alertmanager@sai-mahendra.com'
        smarthost: 'smtp.sendgrid.net:587'
        auth_username: 'apikey'
        auth_password: '${SENDGRID_API_KEY}'
        headers:
          Subject: '[Sai Mahendra] {{ .GroupLabels.alertname }}'
        html: |
          <h2>Alert: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
          
          <h3>Firing Alerts ({{ .Alerts.Firing | len }})</h3>
          <ul>
          {{ range .Alerts.Firing }}
            <li>{{ .Labels.alertname }} on {{ .Labels.instance }}</li>
          {{ end }}
          </ul>
        send_resolved: true
