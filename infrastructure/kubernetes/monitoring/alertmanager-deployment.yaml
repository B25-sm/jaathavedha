apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
      slack_api_url: 'https://hooks.slack.com/services/YOUR_WEBHOOK_URL'

    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      receiver: 'default'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          continue: true
          routes:
            - match:
                component: availability
              receiver: 'pagerduty-critical'
              group_wait: 0s
              group_interval: 5m
              repeat_interval: 4h
        
        - match:
            severity: critical
          receiver: 'slack-critical'
          continue: false
        
        - match:
            severity: warning
          receiver: 'slack-warnings'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 24h
        
        - match:
            severity: info
          receiver: 'email-info'
          group_wait: 5m
          group_interval: 1h
          repeat_interval: 24h
        
        - match:
            component: business
          receiver: 'slack-business'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 6h
        
        - match:
            component: database
          receiver: 'slack-database'
          continue: true
        
        - match:
            component: api
          receiver: 'slack-performance'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'cluster', 'service']
      
      - source_match:
          alertname: 'ServiceDown'
        target_match_re:
          alertname: '.*'
        equal: ['service']
      
      - source_match:
          alertname: 'VeryHighAPIResponseTime'
        target_match:
          alertname: 'HighAPIResponseTime'
        equal: ['service']

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://localhost:9093/api/v1/alerts'
            send_resolved: true

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key_file: /etc/alertmanager/secrets/pagerduty-key
            severity: 'critical'
            description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
            details:
              firing: '{{ .Alerts.Firing | len }}'
              resolved: '{{ .Alerts.Resolved | len }}'
              description: '{{ .CommonAnnotations.description }}'
              cluster: '{{ .GroupLabels.cluster }}'
              service: '{{ .GroupLabels.service }}'
            client: 'Prometheus Alertmanager'
            client_url: 'http://prometheus.monitoring.svc.cluster.local:9090'
            send_resolved: true

      - name: 'slack-critical'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '#alerts-critical'
            username: 'Alertmanager'
            icon_emoji: ':fire:'
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Severity:* {{ .GroupLabels.severity }}
              *Component:* {{ .GroupLabels.component }}
              *Cluster:* {{ .GroupLabels.cluster }}
              
              *Firing Alerts:* {{ .Alerts.Firing | len }}
              {{ range .Alerts.Firing }}
              • {{ .Labels.alertname }} on {{ .Labels.instance }}
              {{ end }}
            send_resolved: true
            title_link: 'http://prometheus.monitoring.svc.cluster.local:9090/alerts'
            color: 'danger'

      - name: 'slack-warnings'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '#alerts-warnings'
            username: 'Alertmanager'
            icon_emoji: ':warning:'
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Component:* {{ .GroupLabels.component }}
              
              *Firing Alerts:* {{ .Alerts.Firing | len }}
            send_resolved: true
            color: 'warning'

      - name: 'slack-business'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '#alerts-business'
            username: 'Business Metrics'
            icon_emoji: ':chart_with_upwards_trend:'
            title: '📊 Business Alert: {{ .GroupLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              
              *Details:*
              {{ range .Alerts.Firing }}
              • {{ .Annotations.description }}
              {{ end }}
            send_resolved: true
            color: '#36a64f'

      - name: 'slack-database'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '#alerts-database'
            username: 'Database Monitor'
            icon_emoji: ':database:'
            title: '🗄️ Database Alert: {{ .GroupLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Severity:* {{ .GroupLabels.severity }}
            send_resolved: true

      - name: 'slack-performance'
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '#alerts-performance'
            username: 'Performance Monitor'
            icon_emoji: ':rocket:'
            title: '⚡ Performance Alert: {{ .GroupLabels.alertname }}'
            text: |
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
            send_resolved: true
            color: 'warning'

      - name: 'email-info'
        email_configs:
          - to: 'ops-team@sai-mahendra.com'
            from: 'alertmanager@sai-mahendra.com'
            smarthost: 'smtp.sendgrid.net:587'
            auth_username: 'apikey'
            auth_password_file: /etc/alertmanager/secrets/sendgrid-key
            headers:
              Subject: '[Sai Mahendra] {{ .GroupLabels.alertname }}'
            html: |
              <h2>Alert: {{ .GroupLabels.alertname }}</h2>
              <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
              <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
              <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
              <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
              
              <h3>Firing Alerts ({{ .Alerts.Firing | len }})</h3>
              <ul>
              {{ range .Alerts.Firing }}
                <li>{{ .Labels.alertname }} on {{ .Labels.instance }}</li>
              {{ end }}
              </ul>
            send_resolved: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-templates
  namespace: monitoring
data:
  default.tmpl: |
    {{ define "slack.default.title" }}
    [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}
    {{ end }}

    {{ define "slack.default.text" }}
    {{ range .Alerts }}
    *Alert:* {{ .Labels.alertname }}
    *Severity:* {{ .Labels.severity }}
    *Summary:* {{ .Annotations.summary }}
    *Description:* {{ .Annotations.description }}
    {{ end }}
    {{ end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: monitoring
type: Opaque
stringData:
  # Replace these with actual values or use external secret management
  pagerduty-key: "YOUR_PAGERDUTY_SERVICE_KEY"
  slack-webhook: "https://hooks.slack.com/services/YOUR_WEBHOOK_URL"
  sendgrid-key: "YOUR_SENDGRID_API_KEY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      serviceAccountName: alertmanager
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--cluster.listen-address=0.0.0.0:9094'
            - '--cluster.advertise-address=$(POD_IP):9094'
            - '--cluster.peer=alertmanager-0.alertmanager:9094'
            - '--cluster.peer=alertmanager-1.alertmanager:9094'
            - '--web.external-url=http://alertmanager.monitoring.svc.cluster.local:9093'
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: web
              containerPort: 9093
            - name: cluster
              containerPort: 9094
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: templates
              mountPath: /etc/alertmanager/templates
            - name: secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: templates
          configMap:
            name: alertmanager-templates
        - name: secrets
          secret:
            secretName: alertmanager-secrets
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 9093
      targetPort: 9093
    - name: cluster
      port: 9094
      targetPort: 9094
  selector:
    app: alertmanager
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-headless
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  clusterIP: None
  ports:
    - name: web
      port: 9093
      targetPort: 9093
    - name: cluster
      port: 9094
      targetPort: 9094
  selector:
    app: alertmanager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: monitoring
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: alertmanager-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - alertmanager.sai-mahendra.com
      secretName: alertmanager-tls
  rules:
    - host: alertmanager.sai-mahendra.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager
                port:
                  number: 9093
