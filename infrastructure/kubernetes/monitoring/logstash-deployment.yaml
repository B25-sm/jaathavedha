apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: monitoring
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    xpack.monitoring.enabled: true
    xpack.monitoring.elasticsearch.hosts: ["http://elasticsearch:9200"]
  
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
      tcp {
        port => 5000
        codec => json
      }
      http {
        port => 8080
        codec => json
      }
    }

    filter {
      # Parse JSON logs
      if [message] =~ /^\{.*\}$/ {
        json {
          source => "message"
        }
      }

      # Add Kubernetes metadata
      if [kubernetes] {
        mutate {
          add_field => {
            "k8s_namespace" => "%{[kubernetes][namespace]}"
            "k8s_pod" => "%{[kubernetes][pod][name]}"
            "k8s_container" => "%{[kubernetes][container][name]}"
          }
        }
      }

      # Parse log level
      if [level] {
        mutate {
          uppercase => ["level"]
        }
      } else if [severity] {
        mutate {
          rename => { "severity" => "level" }
          uppercase => ["level"]
        }
      }

      # Extract service name from tags or labels
      if [service] {
        mutate {
          add_field => { "service_name" => "%{service}" }
        }
      } else if [app] {
        mutate {
          add_field => { "service_name" => "%{app}" }
        }
      }

      # Parse timestamp
      date {
        match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "UNIX"]
        target => "@timestamp"
      }

      # Add geo-location for IP addresses
      if [client_ip] {
        geoip {
          source => "client_ip"
          target => "geoip"
        }
      }

      # Parse user agent
      if [user_agent] {
        useragent {
          source => "user_agent"
          target => "user_agent_parsed"
        }
      }

      # Extract error details
      if [error] {
        mutate {
          add_field => {
            "error_message" => "%{[error][message]}"
            "error_stack" => "%{[error][stack]}"
          }
        }
      }

      # Add environment tag
      mutate {
        add_field => {
          "environment" => "${ENVIRONMENT:production}"
          "platform" => "sai-mahendra"
        }
      }

      # Remove unnecessary fields
      mutate {
        remove_field => ["agent", "ecs", "host", "input"]
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "logstash-%{+YYYY.MM.dd}"
        document_type => "_doc"
      }

      # Output to stdout for debugging (can be disabled in production)
      stdout {
        codec => rubydebug
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: monitoring
  labels:
    app: logstash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.9.0
          ports:
            - name: beats
              containerPort: 5044
            - name: tcp
              containerPort: 5000
            - name: http
              containerPort: 8080
            - name: monitoring
              containerPort: 9600
          env:
            - name: LS_JAVA_OPTS
              value: "-Xmx1g -Xms1g"
            - name: ENVIRONMENT
              value: "production"
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          resources:
            requests:
              cpu: 500m
              memory: 1.5Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: logstash-config
        - name: pipeline
          configMap:
            name: logstash-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: monitoring
  labels:
    app: logstash
spec:
  type: ClusterIP
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: tcp
      port: 5000
      targetPort: 5000
    - name: http
      port: 8080
      targetPort: 8080
    - name: monitoring
      port: 9600
      targetPort: 9600
  selector:
    app: logstash
