# Secrets Template - DO NOT commit actual secrets to version control
# Use this template to create actual secrets in your cluster
# Replace <BASE64_ENCODED_VALUE> with actual base64 encoded values

---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  postgres-url: <BASE64_ENCODED_POSTGRES_URL>
  # Example: postgresql://user:password@postgres:5432/saimahendra

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  url: <BASE64_ENCODED_MONGODB_URL>
  # Example: mongodb://user:password@mongodb:27017/saimahendra

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  url: <BASE64_ENCODED_REDIS_URL>
  # Example: redis://:password@redis:6379

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: sai-mahendra-platform
type: Opaque
data:
  secret: <BASE64_ENCODED_JWT_SECRET>
  refresh-secret: <BASE64_ENCODED_JWT_REFRESH_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  access-key-id: <BASE64_ENCODED_AWS_ACCESS_KEY_ID>
  secret-access-key: <BASE64_ENCODED_AWS_SECRET_ACCESS_KEY>

---
apiVersion: v1
kind: Secret
metadata:
  name: razorpay-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  key-id: <BASE64_ENCODED_RAZORPAY_KEY_ID>
  key-secret: <BASE64_ENCODED_RAZORPAY_KEY_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: stripe-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  secret-key: <BASE64_ENCODED_STRIPE_SECRET_KEY>
  webhook-secret: <BASE64_ENCODED_STRIPE_WEBHOOK_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: sendgrid-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  api-key: <BASE64_ENCODED_SENDGRID_API_KEY>

---
apiVersion: v1
kind: Secret
metadata:
  name: whatsapp-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  api-key: <BASE64_ENCODED_WHATSAPP_API_KEY>
  phone-number-id: <BASE64_ENCODED_WHATSAPP_PHONE_NUMBER_ID>

---
apiVersion: v1
kind: Secret
metadata:
  name: firebase-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  project-id: <BASE64_ENCODED_FIREBASE_PROJECT_ID>
  private-key: <BASE64_ENCODED_FIREBASE_PRIVATE_KEY>
  client-email: <BASE64_ENCODED_FIREBASE_CLIENT_EMAIL>

---
apiVersion: v1
kind: Secret
metadata:
  name: zoom-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  api-key: <BASE64_ENCODED_ZOOM_API_KEY>
  api-secret: <BASE64_ENCODED_ZOOM_API_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: google-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  client-id: <BASE64_ENCODED_GOOGLE_CLIENT_ID>
  client-secret: <BASE64_ENCODED_GOOGLE_CLIENT_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: outlook-credentials
  namespace: sai-mahendra-platform
type: Opaque
data:
  client-id: <BASE64_ENCODED_OUTLOOK_CLIENT_ID>
  client-secret: <BASE64_ENCODED_OUTLOOK_CLIENT_SECRET>
