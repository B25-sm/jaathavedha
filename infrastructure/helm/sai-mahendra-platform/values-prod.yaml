# Production environment values
# Override default values for production environment

global:
  environment: production
  domain: saimahendra.com
  imagePullPolicy: IfNotPresent

# Full replicas for production (uses defaults from values.yaml)
# All autoscaling enabled with production-ready limits

# Ingress configuration for production
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://saimahendra.com"
  hosts:
    - host: api.saimahendra.com
      paths:
        - path: /
          pathType: Prefix
          service: api-gateway
    - host: admin.saimahendra.com
      paths:
        - path: /
          pathType: Prefix
          service: admin-panel
  tls:
    - secretName: sai-mahendra-tls
      hosts:
        - api.saimahendra.com
        - admin.saimahendra.com

# Service Mesh - Strict mode for production
serviceMesh:
  enabled: true
  mtls:
    mode: STRICT
  trafficManagement:
    enabled: true
  circuitBreaker:
    enabled: true

# Monitoring - full stack with alerting
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
  jaeger:
    enabled: true

# Database configuration - production endpoints
database:
  postgres:
    host: postgres-primary.sai-mahendra-platform.svc.cluster.local
    port: 5432
    database: saimahendra_prod
  mongodb:
    host: mongodb-primary.sai-mahendra-platform.svc.cluster.local
    port: 27017
    database: saimahendra_prod
  redis:
    host: redis-master.sai-mahendra-platform.svc.cluster.local
    port: 6379

# Security - strict policies
security:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  networkPolicies:
    enabled: true

# Resource quotas - production limits
resourceQuotas:
  enabled: true
  limits:
    cpu: "20"
    memory: "40Gi"
  requests:
    cpu: "10"
    memory: "20Gi"

# Pod Disruption Budgets - strict for production
podDisruptionBudget:
  enabled: true
  minAvailable: 2
