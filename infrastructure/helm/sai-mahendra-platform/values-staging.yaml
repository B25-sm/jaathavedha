# Staging environment values
# Override default values for staging environment

global:
  environment: staging
  domain: staging.saimahendra.com
  imagePullPolicy: IfNotPresent

# Moderate replicas for staging
services:
  userManagement:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
  
  courseManagement:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
  
  payment:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
  
  contact:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  
  contentManagement:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
  
  analytics:
    replicas: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
  
  notification:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  
  adminPanel:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  
  apiGateway:
    replicas: 2
    serviceType: LoadBalancer
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
  
  pwa:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  
  videoConferencing:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
  
  calendarIntegration:
    replicas: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3

# Ingress configuration for staging
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.staging.saimahendra.com
      paths:
        - path: /
          pathType: Prefix
          service: api-gateway
    - host: admin.staging.saimahendra.com
      paths:
        - path: /
          pathType: Prefix
          service: admin-panel
  tls:
    - secretName: sai-mahendra-staging-tls
      hosts:
        - api.staging.saimahendra.com
        - admin.staging.saimahendra.com

# Service Mesh - Strict mode for staging
serviceMesh:
  enabled: true
  mtls:
    mode: STRICT

# Monitoring - full stack
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
  jaeger:
    enabled: true

# Resource quotas - moderate for staging
resourceQuotas:
  enabled: true
  limits:
    cpu: "15"
    memory: "30Gi"
  requests:
    cpu: "7"
    memory: "15Gi"

# Pod Disruption Budgets - enabled for staging
podDisruptionBudget:
  enabled: true
  minAvailable: 1
